<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8 ">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="file:///android_asset/morphdom-umd.min.js "></script>
    <link rel="stylesheet" href="file:///android_asset/main.css">  <!-- 引用本地CSS文件 -->
    <script>
        var timer1 = null;
        var timer2 = null;
        var animationId = null;
        function sendHTMLContent(htmlContent) {
            try {
                var newDocument = parseHtmlStr(decodeURIComponent(htmlContent));
                morphdom(document.body,newDocument.body);
                if (window.requestAnimationFrame && window.cancelAnimationFrame) {
                    window.cancelAnimationFrame(animationId);
                    clearTimeout(timer2);
                    animationId = window.requestAnimationFrame(function () {
                        var scrollHeight = document.documentElement.scrollHeight;
                        Android.handleData(scrollHeight);
                    });
                    timer2 = setTimeout(function(){
                       var scrollHeight = document.documentElement.scrollHeight;
                       Android.handleData(scrollHeight);
                    },300);
                } else {
                    clearTimeout(timer1);
                    clearTimeout(timer2);
                    timer1 = setTimeout(function(){
                       var scrollHeight = document.documentElement.scrollHeight;
                       Android.handleData(scrollHeight);
                    },20);
                    timer2 = setTimeout(function(){
                       var scrollHeight = document.documentElement.scrollHeight;
                       Android.handleData(scrollHeight);
                    },300);
                }
            } catch(e) {
            }
        }
        function parseHtmlStr(htmlStr) {
            return new DOMParser().parseFromString(htmlStr, "text/html");
        }
    </script>
</head>
<body>

</body>
</html>
